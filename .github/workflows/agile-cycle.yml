name: TCGInvest Agile Cycle

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "staging"]

jobs:
  ci:
    name: Lint, Test & Notify
    runs-on: [self-hosted, paperclip]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip --quiet --break-system-packages
          pip install -r api/requirements.txt --quiet --break-system-packages
          pip install flake8 pytest-asyncio --quiet --break-system-packages

      - name: Install Node dependencies
        working-directory: frontend
        run: |
          rm -rf node_modules
          npm install --prefer-offline --no-audit --no-fund 2>&1 | tail -5

      - name: Lint — Python (flake8)
        run: |
          flake8 api/main.py --max-line-length=120 \
            --ignore=E501,W503,E302,E303,W291,W293 \
            --exclude=api/__pycache__ || true

      - name: Lint — Next.js (eslint)
        working-directory: frontend
        run: npm run lint || true

      - name: Run pytest
        id: pytest
        run: |
          python3 -m pytest api/tests/ -v --tb=short
          echo "test_status=passed" >> $GITHUB_OUTPUT

      - name: Notify n8n
        if: always()
        run: |
          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PYTEST="${{ steps.pytest.outputs.test_status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "\u2705" || echo "\u274c")

          curl -s -X POST http://100.107.74.24:5678/webhook/tcg-ci-result \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$STATUS\",\"branch\":\"$BRANCH\",\"commit\":\"$COMMIT\",\"commit_short\":\"$SHORT\",\"actor\":\"$ACTOR\",\"run_url\":\"$RUN_URL\",\"emoji\":\"$EMOJI\",\"pytest\":\"${PYTEST:-skipped}\"}" \
            && echo "n8n notified" || echo "n8n notify failed (non-fatal)"

      - name: Job Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "\u2705" || echo "\u274c")
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## $EMOJI CI: $STATUS
          | | |
          |---|---|
          | Branch | \`${{ github.ref_name }}\` |
          | Commit | \`$SHORT\` |
          | Actor  | ${{ github.actor }} |
          | Pytest | ${{ steps.pytest.outputs.test_status }} |
          SUMMARY
